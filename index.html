<!doctype html>
<html>
  <head>
    <title>Form and Table</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="form-box">
      <h2>Register Form</h2>
      <form>
        <input type="text" placeholder="Enter Name" required />
        <input type="email" placeholder="Enter Email" required />
        <input type="password" placeholder="Enter Password" required />
        <button type="submit">Submit</button>
      </form>
    </div>

    <div class="table-box">
      <h2>User Data</h2>
      <table>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
        </tr>
        <tr>
          <td>1</td>
          <td>Ali</td>
          <td>ali@email.com</td>
        </tr>
        <tr>
          <td>2</td>
          <td>Ahmed</td>
          <td>ahmed@email.com</td>
        </tr>
        <tr>
          <td>3</td>
          <td>Yousaf</td>
          <td>yousaf@email.com</td>
        </tr>
      </table>
    </div>
  </body>
</html>
